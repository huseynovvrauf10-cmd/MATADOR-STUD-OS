<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matador Social | Resmi Sitesi</title>
    <meta name="description" content="Matador Social - Disiplin ve vizyonun buluştuğu yeni nesil sosyal ağ.">
    <meta name="author" content="Matador Studios">
    
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .navbar { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; color: #ff0000; letter-spacing: 2px; font-size: 1.4rem; text-shadow: 0 0 10px rgba(255,0,0,0.3); }
        
        .container { max-width: 500px; margin: auto; padding: 10px; }
        
        /* Hikayeler */
        .stories { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .story { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0000; background: #222; flex-shrink: 0; }

        /* Gönderi Tasarımı */
        .post { background: #111; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ff0000; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: linear-gradient(45deg, #111, #222); display: flex; align-items: center; justify-content: center; color: #444; font-size: 0.9rem; }
        .post-footer { padding: 12px; }
        .actions { display: flex; gap: 15px; font-size: 1.4rem; margin-bottom: 8px; }
        .like-btn:active { transform: scale(1.2); color: #ff0000; transition: 0.1s; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { font-size: 1.5rem; cursor: pointer; filter: grayscale(1); }
        .nav-item.active { filter: grayscale(0); }

        /* Login Butonu (Deneme) */
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MATADOR</div>
    </div>

    <div class="container">
        <div class="stories">
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
        </div>

        <div class="post">
            <div class="post-header">
                <div class="user-avatar"></div>
                <span>matador_studios</span>
            </div>
            <div class="post-img">
                🚀 İlk adım atıldı. #MatadorSocial
            </div>
            <div class="post-footer">
                <div class="actions">
                    <span class="like-btn" onclick="this.style.color='#ff0000'">❤</span>
                    <span>💬</span>
                    <span>✈</span>
                </div>
                <div><b>2.500 Beğeni</b></div>
                <div style="margin-top: 5px;">Karanlıkta çalış, zirvede parla.</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <span class="nav-item active">🏠</span>
        <span class="nav-item">🔍</span>
        <span class="nav-item" onclick="alert('Matador Paylaşım Sistemi Çok Yakında!')">➕</span>
        <span class="nav-item">👤</span>
    </div>

</body>
</html>
