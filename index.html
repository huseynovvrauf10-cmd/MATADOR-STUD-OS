    <h2>MATADOR FEED</h2>

<div style="background: #111; padding: 15px; border-radius: 10px; border: 1px solid #00f2ea; margin-bottom: 20px;">
    <textarea id="post-text" placeholder="Ne düşünüyorsun kanka?" style="width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px;"></textarea>
    
    <input type="file" id="post-file" accept="image/*,video/*" style="margin-top: 10px; color: #00f2ea;">
    
    <button onclick="paylas()" style="margin-top: 10px; width: 100%; background: #00f2ea; color: #000; font-weight: bold;">PAYLAŞ</button>
</div>

<div id="feed-container">
    </div>

<script>
function paylas() {
    var text = document.getElementById("post-text").value;
    var file = document.getElementById("post-file").files[0];
    var feed = document.getElementById("feed-container");

    if(text == "" && !file) {
        alert("Boş paylaşım olmaz kanka!");
        return;
    }

    // Gönderi Kartı Tasarımı
    var postHTML = `
        <div style="background: #111; border: 1px solid #333; margin-bottom: 20px; border-radius: 10px; overflow: hidden;">
            <div style="padding: 10px; font-weight: bold; color: #ff003c;">@user123</div>
            <div style="padding: 10px; color: #eee;">${text}</div>
            <div id="media-preview" style="background: #222; min-height: 200px; display: flex; align-items: center; justify-content: center; color: #555;">
                ${file ? "📷 Görsel/Video İşleniyor..." : "📝 Sadece Metin"}
            </div>
            <div style="padding: 10px; border-top: 1px solid #222; display: flex; justify-content: space-around;">
                <span>❤️ Beğen</span>
                <span>💬 Yorum Yap</span>
                <span>✈️ Paylaş</span>
            </div>
        </div>
    `;

    feed.innerHTML = postHTML + feed.innerHTML;
    document.getElementById("post-text").value = "";
    document.getElementById("post-file").value = "";
}
</script>

<div class="matador-header">
    <h1>MATADOR MARKETPLACE</h1>
    <p>Ürünlerini tüm dünyaya (veya mahalleye) göster!</p>
</div>

<div style="text-align: center; margin-bottom: 20px;">
    <button onclick="acKapaPanel()">+ Yeni İlan Oluştur</button>
</div>

<div id="ilan-formu" style="display:none; border: 2px dashed #ff003c; padding: 20px; margin-bottom: 30px; background: #111;">
    <h3 style="color: #ff003c;">İlan Detayları</h3>
    <input type="text" id="urun-adi" placeholder="Ürün Adı..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #00f2ea;">
    <input type="number" id="urun-fiyat" placeholder="Fiyat (AZN)..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #00f2ea;">
    <button onclick="ilanPaylas()" style="width: 100%; background: #ff003c; border: none; font-weight: bold;">YAYINLA</button>
</div>

<div id="urun-akisi" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
    </div>

<script>
// Formu açıp kapatan fonksiyon
function acKapaPanel() {
    var x = document.getElementById("ilan-formu");
    if (x.style.display === "none") {
        x.style.display = "block";
    } else {
        x.style.display = "none";
    }
}

// Yeni ilanı ekrana basan fonksiyon
function ilanPaylas() {
    var ad = document.getElementById("urun-adi").value;
    var fiyat = document.getElementById("urun-fiyat").value;

    if(ad == "" || fiyat == "") {
        alert("Kanka boş bırakma, müşteriler neyi alacağını bilsin!");
        return;
    }

    var urunKutusu = `
        <div style="background: #1a1a1a; border: 1px solid #00f2ea; padding: 10px; border-radius: 10px;">
            <div style="height: 100px; background: #333; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555;">GÖRSEL YÜKLENECEK</div>
            <h4 style="margin: 0; color: #00f2ea;">${ad}</h4>
            <p style="color: #ff003c; font-weight: bold;">${fiyat} AZN</p>
            <button style="width: 100%; font-size: 12px; padding: 5px;">Satın Al / Mesaj At</button>
        </div>
    `;

    document.getElementById("urun-akisi").innerHTML += urunKutusu;
    
    // Formu temizle ve kapat
    document.getElementById("urun-adi").value = "";
    document.getElementById("urun-fiyat").value = "";
      // --- FIREBASE'E GÖNDERME KISMI ---
    db.collection("ilanlar").add({
        ad: ad,
        fiyat: fiyat,
        tarih: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        console.log("Veri buluta uçtu kanka! 🚀");
    })
    .catch((error) => {
        console.error("Hata çıktı: ", error);
    });
    // --------------------------------

    acKapaPanel();
}
    
</script>
