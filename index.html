<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matador Social - 🇦🇿</title>
    <style>
        :root { --p: #e91e63; --s: #222; --t: #fff; }
        body { margin: 0; font-family: sans-serif; background: #000; color: var(--t); overflow-x: hidden; }
        
        /* Video Akışı */
        .feed { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { 
            height: 100vh; width: 100vw; scroll-snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sağ Taraf Etkileşim Butonları */
        .side-bar {
            position: absolute; right: 10px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .action-btn { background: none; border: none; color: white; cursor: pointer; text-align: center; }
        .action-btn i { font-size: 30px; display: block; }
        .count { font-size: 14px; margin-top: 5px; }

        /* Profil ve Takip */
        .user-info { position: absolute; bottom: 30px; left: 15px; display: flex; align-items: center; gap: 10px; }
        .follow-btn { background: var(--p); border: none; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* Sohbet Ekranı (Basit Popup) */
        #chat-box {
            position: fixed; bottom: 0; right: 0; width: 300px; height: 400px;
            background: #111; border-top-left-radius: 15px; display: none; flex-direction: column;
            border: 1px solid #333; z-index: 100;
        }
        .chat-header { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .chat-input { display: flex; border-top: 1px solid #333; }
        .chat-input input { flex: 1; background: none; border: none; color: white; padding: 10px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="feed" id="mainFeed">
        <div class="video-card">
            <video src="https://v16-webapp.tiktok.com/..." loop onclick="this.play()"></video>
            
            <div class="user-info">
                <strong>@matador_creator</strong>
                <button class="follow-btn" onclick="toggleFollow(this)">Takip Et</button>
                <span id="follower-count">145</span> Takipçi
            </div>

            <div class="side-bar">
                <div class="action-btn" onclick="handleLike(this, 'like')">
                    <i class="fa-solid fa-heart"></i>
                    <span class="count">1.2k</span>
                </div>
                <div class="action-btn" onclick="handleLike(this, 'dislike')">
                    <i class="fa-solid fa-thumbs-down"></i>
                    <span class="count">12</span>
                </div>
                <div class="action-btn" onclick="toggleChat()">
                    <i class="fa-solid fa-comment-dots"></i>
                    <span class="count">45</span>
                </div>
                <div class="action-btn">
                    <i class="fa-solid fa-share"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-box">
        <div class="chat-header">
            <span>Sohbet: @matador_creator</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white;">X</button>
        </div>
        <div class="messages" id="msgList">
            <div style="color: gray; font-style: italic;">Sohbet başlatıldı...</div>
        </div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Mesaj yaz veya video linki at...">
            <button onclick="sendMessage()" style="background:var(--p); color:white; border:none; padding:10px;">Gönder</button>
        </div>
    </div>

    <script>
        // TAKİP ETME MANTIĞI
        let followers = 145;
        function toggleFollow(btn) {
            if (btn.innerText === "Takip Et") {
                btn.innerText = "Takip Edilir";
                btn.style.background = "#444";
                followers++;
            } else {
                btn.innerText = "Takip Et";
                btn.style.background = "#e91e63";
                followers--;
            }
            document.getElementById('follower-count').innerText = followers;
        }

        // LİKE / DISLIKE MANTIĞI
        function handleLike(element, type) {
            let countSpan = element.querySelector('.count');
            let currentCount = parseFloat(countSpan.innerText);
            
            if (element.style.color === "rgb(233, 30, 99)" || element.style.color === "red") {
                element.style.color = "white";
                countSpan.innerText = (currentCount - 1).toFixed(0);
            } else {
                element.style.color = type === 'like' ? "#e91e63" : "red";
                countSpan.innerText = (currentCount + 1).toFixed(0);
            }
        }

        // SOHBET SİSTEMİ
        function toggleChat() {
            const chat = document.getElementById('chat-box');
            chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const list = document.getElementById('msgList');
            if (input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.style.marginBottom = "8px";
                msg.innerHTML = `<b>Sen:</b> ${input.value}`;
                list.appendChild(msg);
                
                // Video Linki Algılama (Basit)
                if(input.value.includes('http')) {
                    const vLink = document.createElement('div');
                    vLink.innerHTML = `<small style="color:var(--p)">[Video Gönderildi]</small>`;
                    list.appendChild(vLink);
                }
                
                input.value = "";
                list.scrollTop = list.scrollHeight;
            }
        }

        // Video Otomatik Oynatma (Kaydırdıkça)
        document.getElementById('mainFeed').addEventListener('scroll', () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                const rect = v.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    v.play();
                } else {
                    v.pause();
                }
            });
        });
    </script>
</body>
</html>
