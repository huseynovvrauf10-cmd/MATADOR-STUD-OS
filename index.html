<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATADOR PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; margin: 0; padding-bottom: 70px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div class="matador-header">
    <h1>MATADOR MARKETPLACE</h1>
    <p>Ürünlerini tüm dünyaya (veya mahalleye) göster!</p>
</div>

<div style="text-align: center; margin-bottom: 20px;">
    <button onclick="acKapaPanel()">+ Yeni İlan Oluştur</button>
</div>

<div id="ilan-formu" style="display:none; border: 2px dashed #ff003c; padding: 20px; margin-bottom: 30px; background: #111;">
    <h3 style="color: #ff003c;">İlan Detayları</h3>
    <input type="text" id="urun-adi" placeholder="Ürün Adı..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #00f2ea;">
    <input type="number" id="urun-fiyat" placeholder="Fiyat (AZN)..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #00f2ea;">
    <button onclick="ilanPaylas()" style="width: 100%; background: #ff003c; border: none; font-weight: bold;">YAYINLA</button>
</div>

<div id="urun-akisi" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
    </div>

<script>
// Formu açıp kapatan fonksiyon
function acKapaPanel() {
    var x = document.getElementById("ilan-formu");
    if (x.style.display === "none") {
        x.style.display = "block";
    } else {
        x.style.display = "none";
    }
}

// Yeni ilanı ekrana basan fonksiyon
function ilanPaylas() {
    var ad = document.getElementById("urun-adi").value;
    var fiyat = document.getElementById("urun-fiyat").value;

    if(ad == "" || fiyat == "") {
        alert("Kanka boş bırakma, müşteriler neyi alacağını bilsin!");
        return;
    }

    var urunKutusu = `
        <div style="background: #1a1a1a; border: 1px solid #00f2ea; padding: 10px; border-radius: 10px;">
            <div style="height: 100px; background: #333; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555;">GÖRSEL YÜKLENECEK</div>
            <h4 style="margin: 0; color: #00f2ea;">${ad}</h4>
            <p style="color: #ff003c; font-weight: bold;">${fiyat} AZN</p>
            <button style="width: 100%; font-size: 12px; padding: 5px;">Satın Al / Mesaj At</button>
        </div>
    `;

    document.getElementById("urun-akisi").innerHTML += urunKutusu;
    
    // Formu temizle ve kapat
    document.getElementById("urun-adi").value = "";
    document.getElementById("urun-fiyat").value = "";
    acKapaPanel();
}
</script>

    <header class="flex justify-between items-center p-4 border-b border-gray-900 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-black italic text-red-600 tracking-tighter">MATADOR</h1>
        <div class="flex gap-6 text-xl">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-paper-plane" onclick="alert('DM Kutusu Yakında!')"></i>
        </div>
    </header>

    <div class="flex gap-4 p-4 overflow-x-auto no-scrollbar border-b border-gray-900">
        <div class="flex-shrink-0 text-center">
            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-yellow-400 to-red-600 p-0.5">
                <div class="bg-black rounded-full p-0.5">
                    <img src="https://via.placeholder.com/100" class="rounded-full">
                </div>
            </div>
            <span class="text-[10px]">Senin Hikayen</span>
        </div>
        </div>

    <main id="feed" class="flex flex-col">
        <div class="w-full border-b border-gray-900 mb-4">
            <div class="flex items-center p-3 gap-2">
                <div class="w-8 h-8 rounded-full bg-gray-600"></div>
                <span class="text-sm font-bold">matador_pilot</span>
            </div>
            <div class="bg-gray-800 aspect-square flex items-center justify-center text-gray-500">
                [Burada Foto/Video/Reels Olacak]
            </div>
            <div class="p-3">
                <div class="flex gap-4 text-2xl mb-2">
                    <i class="fa-regular fa-heart hover:text-red-600"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-share-from-square"></i>
                </div>
                <p class="text-sm"><b>15.400 Beğeni</b></p>
                <p class="text-sm"><b>matador_pilot</b> Yeni proje başlıyor! #matador #pro</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-900 flex justify-around p-4 text-2xl text-gray-400">
        <i class="fa-solid fa-house text-white"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <i class="fa-regular fa-circle-user"></i>
    </nav>

</body>
</html>
