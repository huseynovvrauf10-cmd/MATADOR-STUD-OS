<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matador Social | Imperial</title>
    <style>
        :root { --red: #ff0000; --bg: #000; --card: #111; --text: #fff; --gray: #888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Navbar */
        .header { background: rgba(17, 17, 17, 0.95); padding: 15px; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 900; color: var(--red); font-size: 1.7rem; letter-spacing: 4px; text-shadow: 0 0 10px rgba(255,0,0,0.3); }

        /* Stories */
        .story-container { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; }
        .story-container::-webkit-scrollbar { display: none; }
        .story { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--red); background: #222; padding: 2px; flex-shrink: 0; }
        .story-inner { width: 100%; height: 100%; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        .container { max-width: 500px; margin: auto; padding: 10px; }
        .page { display: none; animation: slideIn 0.3s ease; }
        .active-page { display: block; }

        /* Paylaşım Kutusu */
        .add-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; resize: none; font-size: 1rem; margin-bottom: 10px; }
        .input-alt { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 8px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 10px; }
        .btn-main { background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        /* Post Tasarımı */
        .post { background: var(--card); border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; overflow: hidden; }
        .post-top { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .user-icon { width: 35px; height: 35px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-img { width: 100%; max-height: 450px; object-fit: cover; background: #0a0a0a; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .post-txt { padding: 15px; font-size: 1rem; line-height: 1.5; }
        .post-bot { padding: 12px; display: flex; align-items: center; gap: 15px; border-top: 1px solid #1a1a1a; }
        .heart { font-size: 1.5rem; cursor: pointer; color: #555; transition: 0.2s; }
        .heart.active { color: var(--red); transform: scale(1.1); }
        .like-count { font-weight: bold; font-size: 0.9rem; }

        /* Profil Sayfası */
        .p-info { text-align: center; padding: 30px 10px; }
        .p-avatar { width: 110px; height: 110px; border-radius: 50%; background: var(--red); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border: 4px solid #111; box-shadow: 0 0 25px rgba(255,0,0,0.2); }
        .p-stat-box { display: flex; justify-content: space-around; margin: 25px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; padding: 15px 0; }

        /* Navigasyon */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; backdrop-filter: blur(15px); }
        .tab { font-size: 1.6rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .tab.active { opacity: 1; color: var(--red); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header"><div class="logo">MATADOR</div></div>

    <div id="home" class="page active-page">
        <div class="story-container">
            <div class="story"><div class="story-inner">🇦🇿</div></div>
            <div class="story"><div class="story-inner">🦁</div></div>
            <div class="story"><div class="story-inner">🔥</div></div>
            <div class="story"><div class="story-inner">💎</div></div>
            <div class="story"><div class="story-inner">🥊</div></div>
        </div>
        
        <div class="container">
            <div class="add-card">
                <textarea id="tInput" placeholder="Nə baş verir, Matador?"></textarea>
                <input type="text" id="iInput" class="input-alt" placeholder="Şəkil linki əlavə et (məcburi deyil)">
                <button class="btn-main" onclick="sharePost()">Paylaş</button>
            </div>
            <div id="main-feed"></div>
        </div>
    </div>

    <div id="profile" class="page">
        <div class="container">
            <div class="p-info">
                <div class="p-avatar">M</div>
                <h2 style="margin:5px 0;">matador_dev</h2>
                <p style="color:var(--red); font-weight: bold; margin-top:0;">Founder & Architect</p>
                <p style="color: var(--gray); font-size: 0.95rem; line-height: 1.4;">"Mən uduzmuram, ya qazanıram, ya da öyrənirəm. Allahın izni ilə Azərbaycanın yeni rəqəmsal tarixini yazırıq." 🇦🇿🚀</p>
                
                <div class="p-stat-box">
                    <div><b>12</b><br><small style="color:var(--gray)">Post</small></div>
                    <div><b>4.5K</b><br><small style="color:var(--gray)">İzləyici</small></div>
                    <div><b>180</b><br><small style="color:var(--gray)">Təqib</small></div>
                </div>
                <button class="btn-main" style="background:#222; border:1px solid #444;">Profili Redaktə Et</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <span class="tab active" id="t-home" onclick="nav('home')">🏠</span>
        <span class="tab">🔍</span>
        <span class="tab">➕</span>
        <span class="tab" id="t-profile" onclick="nav('profile')">👤</span>
    </div>

    <script>
        // Sayfa Yönetimi
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('t-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Post Paylaşma
        function sharePost() {
            const t = document.getElementById('tInput');
            const i = document.getElementById('iInput');
            if(!t.value && !i.value) return;

            const post = {
                id: Date.now(),
                text: t.value,
                img: i.value,
                likes: 0,
                isLiked: false
            };

            let posts = JSON.parse(localStorage.getItem('mt_posts') || '[]');
            posts.unshift(post);
            localStorage.setItem('mt_posts', JSON.stringify(posts));
            
            t.value = ""; i.value = "";
            loadFeed();
        }

        // Feed Yükleme
        function loadFeed() {
            const feed = document.getElementById('main-feed');
            const posts = JSON.parse(localStorage.getItem('mt_posts') || '[]');
            feed.innerHTML = "";

            posts.forEach(p => {
                const imgPart = p.img ? `<img src="${p.img}" class="post-img" onerror="this.style.display='none'">` : '';
                const likedClass = p.isLiked ? 'active' : '';
                
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-top">
                            <div class="user-icon">M</div>
                            <b>matador_dev</b>
                        </div>
                        <div class="post-txt">${p.text}</div>
                        ${imgPart}
                        <div class="post-bot">
                            <span class="heart ${likedClass}" onclick="handleLike(${p.id})">❤</span>
                            <span class="like-count" id="count-${p.id}">${p.likes} bəyəni</span>
                        </div>
                    </div>
                `;
            });
        }

        // Beğeni Yönetimi
        function handleLike(id) {
            let posts = JSON.parse(localStorage.getItem('mt_posts') || '[]');
            let post = posts.find(x => x.id === id);
            
            if(post) {
                if(!post.isLiked) {
                    post.likes++;
                    post.isLiked = true;
                } else {
                    post.likes--;
                    post.isLiked = false;
                }
                localStorage.setItem('mt_posts', JSON.stringify(posts));
                loadFeed();
            }
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
