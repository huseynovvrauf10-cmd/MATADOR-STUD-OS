<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matador Social</title>
    <style>
        /* Matador Karanlık Tema */
        body { background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        /* Üst Menü */
        .navbar { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; color: #ff0000; letter-spacing: 2px; font-size: 1.2rem; }

        /* Ana İçerik */
        .container { max-width: 500px; margin: 20px auto; padding: 10px; }

        /* Hikayeler */
        .stories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .story { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0000; background: #222; }

        /* Paylaşım Kartı */
        .post { background: #111; border: 1px solid #222; border-radius: 10px; margin-bottom: 20px; }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; }
        .user-icon { width: 35px; height: 35px; border-radius: 50%; background: #333; }
        .post-img { width: 100%; height: 300px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #444; }
        .post-footer { padding: 15px; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 10px; font-size: 1.2rem; }
        .like-btn { color: #ff0000; cursor: pointer; }

        /* Alt Menü (Mobil için) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 1.2rem; cursor: pointer; }
        .active { color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MATADOR SOCIAL</div>
    </div>

    <div class="container">
        <div class="stories">
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
            <div class="story"></div>
        </div>

        <div class="post">
            <div class="post-header">
                <div class="user-icon"></div>
                <span><b>matador_dev</b></span>
            </div>
            <div class="post-img">
                [GÖRSEL BURADA OLACAK]
            </div>
            <div class="post-footer">
                <div class="btn-group">
                    <span class="like-btn">❤</span>
                    <span>💬</span>
                    <span>✈</span>
                </div>
                <div><b>1.245 Beğeni</b></div>
                <div style="margin-top: 5px;"><b>matador_dev</b> Hedef şah-mat! Sessizce çalışmaya devam...</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <span class="nav-item active">🏠</span>
        <span class="nav-item">🔍</span>
        <span class="nav-item">➕</span>
        <span class="nav-item">👤</span>
    </div>

</body>
</html>
