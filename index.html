<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATADOR PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; margin: 0; padding-bottom: 70px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-4 border-b border-gray-900 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-black italic text-red-600 tracking-tighter">MATADOR</h1>
        <div class="flex gap-6 text-xl">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-paper-plane" onclick="alert('DM Kutusu Yakında!')"></i>
        </div>
    </header>

    <div class="flex gap-4 p-4 overflow-x-auto no-scrollbar border-b border-gray-900">
        <div class="flex-shrink-0 text-center">
            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-yellow-400 to-red-600 p-0.5">
                <div class="bg-black rounded-full p-0.5">
                    <img src="https://via.placeholder.com/100" class="rounded-full">
                </div>
            </div>
            <span class="text-[10px]">Senin Hikayen</span>
        </div>
        </div>

    <main id="feed" class="flex flex-col">
        <div class="w-full border-b border-gray-900 mb-4">
            <div class="flex items-center p-3 gap-2">
                <div class="w-8 h-8 rounded-full bg-gray-600"></div>
                <span class="text-sm font-bold">matador_pilot</span>
            </div>
            <div class="bg-gray-800 aspect-square flex items-center justify-center text-gray-500">
                [Burada Foto/Video/Reels Olacak]
            </div>
            <div class="p-3">
                <div class="flex gap-4 text-2xl mb-2">
                    <i class="fa-regular fa-heart hover:text-red-600"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-share-from-square"></i>
                </div>
                <p class="text-sm"><b>15.400 Beğeni</b></p>
                <p class="text-sm"><b>matador_pilot</b> Yeni proje başlıyor! #matador #pro</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-900 flex justify-around p-4 text-2xl text-gray-400">
        <i class="fa-solid fa-house text-white"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <i class="fa-regular fa-circle-user"></i>
    </nav>

</body>
</html>
