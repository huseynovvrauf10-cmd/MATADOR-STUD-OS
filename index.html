<!DOCTYPE html>
<html lang="az">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MATADOR">
<link rel="apple-touch-icon" href="https://via.placeholder.com/192/ff0000/ffffff?text=M">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATADOR INFINITY | The Ultimate Social OS</title>
    <style>
        :root {
            --red: #ff0000; --neon: #ff3c3c; --bg: #000; --card: #111; 
            --glass: rgba(255, 255, 255, 0.05); --text: #fff; --gray: #888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding-bottom: 80px; overflow-x: hidden;
        }

        /* Header */
        .app-bar {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222;
        }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .top-icons { display: flex; gap: 20px; font-size: 1.4rem; }

        /* Stories */
        .stories-wrapper {
            display: flex; gap: 15px; padding: 15px; overflow-x: auto; 
            scrollbar-width: none; background: #050505;
        }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-unit { text-align: center; font-size: 0.7rem; color: var(--gray); min-width: 70px; }
        .ring {
            width: 70px; height: 70px; border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            margin-bottom: 5px;
        }
        .user-thumb { 
            width: 100%; height: 100%; border-radius: 50%; background: #222; 
            border: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        /* Pages */
        .page { display: none; animation: slideUp 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .active { display: block; }

        .container { max-width: 500px; margin: auto; padding: 10px; }

        /* Share Area */
        .share-card {
            background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 25px;
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        textarea {
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 15px; border-radius: 15px; resize: none; margin-bottom: 10px;
        }
        .input-field {
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem;
        }
        .btn-post {
            background: var(--red); color: #fff; border: none; width: 100%;
            padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }

        /* Post UI */
        .post-card { background: var(--card); border-radius: 20px; margin-bottom: 20px; overflow: hidden; border: 1px solid #1a1a1a; }
        .post-user { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .avatar-mini { width: 35px; height: 35px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .media-box { width: 100%; background: #000; min-height: 200px; }
        .media-box img, .media-box video { width: 100%; max-height: 500px; object-fit: cover; }
        .post-info { padding: 15px; }
        .post-actions { display: flex; gap: 20px; font-size: 1.6rem; margin-bottom: 10px; }
        .heart { cursor: pointer; transition: 0.2s; color: #444; }
        .heart.liked { color: var(--red); transform: scale(1.1); }
        
        /* Profile */
        .profile-header { text-align: center; padding: 40px 20px; }
        .profile-pic {
            width: 100px; height: 100px; background: var(--red); border-radius: 50%;
            margin: 0 auto 15px; border: 4px solid #222; font-size: 3rem; display: flex; align-items: center; justify-content: center;
        }
        .stats-bar { display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #222; margin-top: 20px; }
        .stat-val { font-weight: bold; display: block; font-size: 1.2rem; }
        .stat-label { color: var(--gray); font-size: 0.8rem; }

        /* Bottom Nav */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #222; backdrop-filter: blur(15px); z-index: 1000;
        }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--red); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="logo">MATADOR</div>
        <div class="top-icons">
            <span onclick="alert('Tezliklə: Canlı Yayım')">📺</span>
            <span onclick="changePage('messages')">💬</span>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="stories-wrapper">
            <div class="story-unit"><div class="ring"><div class="user-thumb">🇦🇿</div></div><span>Sənin</span></div>
            <div class="story-unit"><div class="ring"><div class="user-thumb">🦁</div></div><span>Aslan</span></div>
            <div class="story-unit"><div class="ring"><div class="user-thumb">🔥</div></div><span>Trend</span></div>
            <div class="story-unit"><div class="ring"><div class="user-thumb">👑</div></div><span>VIP</span></div>
        </div>
        <div class="container">
            <div class="share-card">
                <textarea id="txtInp" placeholder="Matador, dünyaya nə demək istəyirsən?"></textarea>
                <input type="text" id="urlInp" class="input-field" placeholder="Media URL (Şəkil, Video, YouTube)...">
                <button class="btn-post" onclick="createPost()">Paylaş</button>
            </div>
            <div id="feed"></div>
        </div>
    </div>

    <div id="messages" class="page">
        <div class="container" style="text-align: center; padding-top: 50px;">
            <h2>Mesajlar</h2>
            <p style="color:var(--gray)">Hələ ki, yeni mesaj yoxdur.</p>
            <button class="btn-post" style="width:auto; padding: 10px 30px;" onclick="changePage('home')">Geri qayıt</button>
        </div>
    </div>

    <div id="profile" class="page">
        <div class="profile-header">
            <div class="profile-pic">M</div>
            <h2 style="margin:5px 0;">matador_dev</h2>
            <p style="color:var(--gray)">Azərbaycanın Rəqəmsal İmperiyası 🇦🇿</p>
            <div class="stats-bar">
                <div><span class="stat-val" id="postCount">0</span><span class="stat-label">Post</span></div>
                <div><span class="stat-val">1.2M</span><span class="stat-label">İzləyici</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Təqib</span></div>
            </div>
            <button class="btn-post" style="background:#222; border:1px solid #444;">Profili Redaktə Et</button>
        </div>
    </div>

    <div class="nav-bottom">
        <span class="nav-item active" id="btn-home" onclick="changePage('home')">🏠</span>
        <span class="nav-item">🔍</span>
        <span class="nav-item" onclick="window.scrollTo(0,0)">➕</span>
        <span class="nav-item" id="btn-profile" onclick="changePage('profile')">👤</span>
    </div>

    <script>
        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(document.getElementById('btn-'+pageId)) document.getElementById('btn-'+pageId).classList.add('active');
        }

        function createPost() {
            const txt = document.getElementById('txtInp');
            const url = document.getElementById('urlInp');
            if(!txt.value && !url.value) return;

            const post = {
                id: Date.now(),
                content: txt.value,
                media: url.value,
                likes: 0,
                liked: false,
                comments: []
            };

            let posts = JSON.parse(localStorage.getItem('matador_inf') || '[]');
            posts.unshift(post);
            localStorage.setItem('matador_inf', JSON.stringify(posts));
            txt.value = ""; url.value = "";
            render();
        }

        function render() {
            const feed = document.getElementById('feed');
            const posts = JSON.parse(localStorage.getItem('matador_inf') || '[]');
            document.getElementById('postCount').innerText = posts.length;
            feed.innerHTML = "";

            posts.forEach(p => {
                let mediaTag = "";
                if(p.media) {
                    if(p.media.includes('mp4')) mediaTag = `<video src="${p.media}" controls></video>`;
                    else if(p.media.includes('youtube')) {
                        let id = p.media.split('v=')[1] || p.media.split('/').pop();
                        mediaTag = `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${id}" frameborder="0"></iframe>`;
                    }
                    else mediaTag = `<img src="${p.media}" onerror="this.style.display='none'">`;
                }

                feed.innerHTML += `
                    <div class="post-card">
                        <div class="post-user"><div class="avatar-mini">M</div> matador_dev</div>
                        <div class="media-box">${mediaTag}</div>
                        <div class="post-info">
                            <div class="post-actions">
                                <span class="heart ${p.liked?'liked':''}" onclick="doLike(${p.id})">❤</span>
                                <span>💬</span> <span>✈</span>
                            </div>
                            <b>${p.likes} bəyəni</b><br>
                            <span><b>matador_dev</b> ${p.content}</span>
                        </div>
                    </div>
                `;
            });
        }

        function doLike(id) {
            let posts = JSON.parse(localStorage.getItem('matador_inf') || '[]');
            let p = posts.find(x => x.id === id);
            if(p) {
                p.liked = !p.liked;
                p.liked ? p.likes++ : p.likes--;
                localStorage.setItem('matador_inf', JSON.stringify(posts));
                render();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
