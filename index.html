<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matador Social | Pro Edition</title>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background-color: black; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 80px; }
        
        .navbar { background: var(--dark); padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; color: var(--red); font-size: 1.6rem; letter-spacing: 3px; }

        .page { display: none; padding: 15px; max-width: 500px; margin: auto; animation: fadeIn 0.3s; }
        .active-page { display: block; }

        /* Paylaşım Kutusu */
        .post-input-card { background: var(--gray); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; resize: none; box-sizing: border-box; font-size: 1rem; }
        .img-input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; box-sizing: border-box; }
        .btn-send { background: var(--red); color: white; border: none; padding: 12px; border-radius: 25px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .btn-send:active { transform: scale(0.95); }

        /* Post Tasarımı */
        .post-card { background: var(--dark); border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; }
        .avatar-sm { width: 35px; height: 35px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-content { padding: 15px; font-size: 1.05rem; line-height: 1.4; }
        .post-img { width: 100%; max-height: 400px; object-fit: cover; display: block; background: #111; }
        .post-footer { padding: 12px; border-top: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .like-btn { cursor: pointer; font-size: 1.3rem; transition: 0.2s; }
        .like-btn.liked { color: var(--red); transform: scale(1.2); }

        /* Profil Kısmı */
        .profile-container { text-align: center; padding-top: 30px; }
        .main-avatar { width: 100px; height: 100px; background: var(--red); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: var(--red); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="navbar"><div class="logo">MATADOR</div></div>

    <div id="home" class="page active-page">
        <div class="post-input-card">
            <textarea id="postTxt" placeholder="Nə baş verir?"></textarea>
            <input type="text" id="postImg" class="img-input" placeholder="Şəkil linki (isteğe bağlı)...">
            <button class="btn-send" onclick="createPost()">Paylaş</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="profile" class="page">
        <div class="profile-container">
            <div class="main-avatar">M</div>
            <h2>matador_dev</h2>
            <p style="color:var(--red); font-weight: bold;">Founder & Architect</p>
            <p style="padding: 0 30px; color: #aaa;">"Allah imtahan edər, mən təkrar dənəyərəm." 🇦🇿</p>
            <hr style="border: 0.5px solid #222; margin: 20px;">
            <div style="display:flex; justify-content: space-around;">
                <div><b>15</b><br><small>Post</small></div>
                <div><b>1.2k</b><br><small>Followers</small></div>
                <div><b>250</b><br><small>Following</small></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <span class="nav-item active" id="btn-home" onclick="go('home')">🏠</span>
        <span class="nav-item" id="btn-profile" onclick="go('profile')">👤</span>
    </div>

    <script>
        // Sayfa Değiştirme
        function go(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        // Post Oluşturma
        function createPost() {
            let txt = document.getElementById('postTxt');
            let img = document.getElementById('postImg');
            if(txt.value == "" && img.value == "") return;

            let postData = {
                id: Date.now(),
                user: "matador_dev",
                text: txt.value,
                image: img.value,
                likes: 0
            };

            savePost(postData);
            txt.value = "";
            img.value = "";
        }

        function savePost(data) {
            let posts = JSON.parse(localStorage.getItem('m_posts') || '[]');
            posts.unshift(data);
            localStorage.setItem('m_posts', JSON.stringify(posts));
            renderFeed();
        }

        function renderFeed() {
            let posts = JSON.parse(localStorage.getItem('m_posts') || '[]');
            let feed = document.getElementById('feed');
            feed.innerHTML = "";

            posts.forEach(p => {
                let imgTag = p.image ? `<img src="${p.image}" class="post-img" onerror="this.style.display='none'">` : '';
                feed.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="avatar-sm">M</div>
                            <b>${p.user}</b>
                        </div>
                        <div class="post-content">${p.text}</div>
                        ${imgTag}
                        <div class="post-footer">
                            <span class="like-btn" onclick="likePost(${p.id})">❤</span>
                            <small id="l-${p.id}">${p.likes} bəyəni</small>
                        </div>
                    </div>
                `;
            });
        }

        function likePost(id) {
            let posts = JSON.parse(localStorage.getItem('m_posts') || '[]');
            let post = posts.find(p => p.id === id);
            if(post) {
                post.likes++;
                localStorage.setItem('m_posts', JSON.stringify(posts));
                renderFeed();
            }
        }

        // Başlangıçta yükle
        window.onload = renderFeed;
    </script>
</body>
</html>
